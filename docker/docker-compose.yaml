services:
  # PHP / Laravel アプリケーション
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: laravel-app
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../src/:/var/www
    networks:
      - laravel-network

  # Nginx ウェブサーバー
  app-anginx:
    image: nginx:alpine
    container_name: laravel-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../src:/var/www
      - ./nginx:/etc/nginx/conf.d/
    networks:
      - laravel-network

  # MySQL データベース
  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network
  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: laravel-mailpit
    ports:
      - '1025:1025' # SMTP サーバー用
      - '8025:8025' # Web UI 確認用 (http://localhost:8025)
    networks:
      - laravel-network

  redis:
    image: redis:alpine
    container_name: laravel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel-network
    volumes:
      - redisdata:/data
networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local

